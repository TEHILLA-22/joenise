name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Optional: Add health check to ensure DB is ready before proceeding
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set Environment Variables
        run: |
          export DJANGO_SETTINGS_MODULE=config.settings.production
          echo "DJANGO_SETTINGS_MODULE=$DJANGO_SETTINGS_MODULE" >> $GITHUB_ENV

      # 🔥 CRITICAL FIX: Enter the backend directory
      - name: Change Directory to Backend
        run: cd backend

      - name: Install Dependencies
        run: pip install -r requirements/base.txt

      # Linting Steps
      - name: Check Black Formatting
        run: black . --check

      - name: Check Isort Imports
        run: isort . --check-only

      - name: Flake8 Linter
        run: flake8 .

      # Django Checks
      - name: Django System Check
        run: python manage.py check

      # Run Tests
      - name: Run Tests
        run: python manage.py test