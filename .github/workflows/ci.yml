name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Change Directory to Frontend
        run: cd frontend
            
      - run: npm install

      - run: npm run type-check

      - run: npm run lint

      - run: npm run test:ci

      - run: npm run build